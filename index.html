<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shader Hand Particle System</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<!-- Postprocessing -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let scene, camera, renderer, composer;
let particles, positions, velocities;
let count = 8000;

let attractor = { x: 0, y: 0, z: 0, gesture: "point" };
let material, core;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.002);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 200;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 🌌 粒子
  let geometry = new THREE.BufferGeometry();
  positions = new Float32Array(count * 3);
  velocities = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    let r = Math.random() * 150;
    let angle = Math.random() * Math.PI * 2;

    positions[i*3] = Math.cos(angle) * r;
    positions[i*3+1] = (Math.random() - 0.5) * 20;
    positions[i*3+2] = Math.sin(angle) * r;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  // ✨ Shader材质
  material = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: `
      uniform float time;
      varying float vDist;

      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        float dist = length(mvPosition.xyz);
        vDist = dist;

        float wave = sin(time + position.x * 0.05) * 2.0;
        mvPosition.y += wave;

        gl_PointSize = 8.0 * (200.0 / dist);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying float vDist;

      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);

        float glow = smoothstep(0.5, 0.0, d);

        vec3 color = mix(
          vec3(0.2,0.4,1.0),
          vec3(0.8,0.2,1.0),
          vDist * 0.005
        );

        float pulse = sin(vDist * 0.05) * 0.5 + 0.5;
        color *= pulse;

        gl_FragColor = vec4(color, glow);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  particles = new THREE.Points(geometry, material);
  scene.add(particles);

  // 🔵 黑洞核心
  let coreGeo = new THREE.SphereGeometry(10, 32, 32);
  let coreMat = new THREE.MeshBasicMaterial({ color: 0x66aaff });
  core = new THREE.Mesh(coreGeo, coreMat);
  scene.add(core);

  // ✨ Bloom
  const renderScene = new THREE.RenderPass(scene, camera);
  const bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.5, 0.4, 0.85
  );

  composer = new THREE.EffectComposer(renderer);
  composer.addPass(renderScene);
  composer.addPass(bloomPass);

  setupHands();
}

function setupHands() {
  const video = document.createElement("video");

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.5
  });

  hands.onResults(results => {
    if (results.multiHandLandmarks.length > 0) {
      let hand = results.multiHandLandmarks[0];

      let index = hand[8];
      attractor.x = (index.x - 0.5) * 400;
      attractor.y = -(index.y - 0.5) * 400;

      let thumb = hand[4];
      let d = Math.hypot(thumb.x - index.x, thumb.y - index.y);

      if (d < 0.05) attractor.gesture = "pinch";
      else attractor.gesture = "point";

      let open = 0;
      let tips = [8,12,16,20];
      for (let i of tips) {
        if (hand[i].y < hand[i-2].y) open++;
      }

      if (open >= 4) attractor.gesture = "open";
      if (open === 0) attractor.gesture = "fist";
    }
  });

  const cam = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 640,
    height: 480
  });
  cam.start();
}

function animate() {
  requestAnimationFrame(animate);

  let pos = particles.geometry.attributes.position.array;

  for (let i = 0; i < count; i++) {
    let ix = i * 3;

    let dx = attractor.x - pos[ix];
    let dy = attractor.y - pos[ix+1];
    let dz = attractor.z - pos[ix+2];

    let dist = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.1;

    let force = 0;

    if (attractor.gesture === "point") force = 50 / (dist*dist);
    if (attractor.gesture === "pinch") force = 200 / (dist*dist);
    if (attractor.gesture === "open") force = -150 / (dist*dist);
    if (attractor.gesture === "fist") force = -50 / (dist*dist);

    velocities[ix] += dx/dist * force - dz * 0.002;
    velocities[ix+2] += dz/dist * force + dx * 0.002;
    velocities[ix+1] += dy/dist * force;

    velocities[ix] *= 0.96;
    velocities[ix+1] *= 0.96;
    velocities[ix+2] *= 0.96;

    pos[ix] += velocities[ix];
    pos[ix+1] += velocities[ix+1];
    pos[ix+2] += velocities[ix+2];
  }

  particles.geometry.attributes.position.needsUpdate = true;

  material.uniforms.time.value += 0.02;

  core.position.set(attractor.x, attractor.y, attractor.z);

  composer.render();
}
</script>

</body>
</html>
